background {
 monitor =
 # Пустой путь принуждает hyprlock сделать скриншот экрана перед блокировкой
 path = screenshot
 # Сила размытия (выше число — сильнее блюр)
 blur_passes = 3
 blur_size = 8
 noise = 0.0117
 contrast = 0.8916
 brightness = 0.8172
 vibrancy = 0.1696
 vibrancy_darkness = 0.0
}

input-field {
 monitor =
 size = 200, 50
 outline_thickness = 3
 dots_size = 0.33
 dots_spacing = 0.15
 dots_center = true
 outer_color = rgba(15, 15, 15, 0.5)
 inner_color = rgba(200, 200, 200, 0.3)
 font_color = rgb(255, 255, 255)
 fade_on_empty = false
 # Пустая строка полностью убирает текст Введите пароль
 placeholder_text = 
 hide_input = false
 position = 0, -20
 halign = center
 valign = center
}

label {
 monitor =
 text = $TIME
 color = rgba(255, 255, 255, 0.9)
 font_size = 80
 # Изменено на современный моноширинный шрифт JetBrains Mono
 font_family = JetBrains Mono Nerd Font
 position = 0, 100
 halign = center
 valign = center
}