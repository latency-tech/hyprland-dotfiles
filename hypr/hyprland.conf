

source = ~/.config/hypr/colors.conf

### --- Variables ---
$mainMod = SUPER
$terminal = foot
$fileManager = yazi
$menu = rofi -show drun
$wallpaper = matuwall


### --- Window Rules ---
windowrule = float on, dim_around on, no_blur on, move (cursor_x-(window_w*0.5)) (cursor_y-(window_h*0.5)), match:title ^Clipboard$

### --- Autostart ---
exec-once = awww-daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = swayosd-server
exec-once = swaync
exec-once = waybar
exec-once = clipman
### --- Customization --
monitor=,preferred,auto,1
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.75
    inactive_opacity = 0.7
    blur {
        enabled = true
        size = 5
        passes = 5
        new_optimizations = true
    }
    shadow {
        enabled = true
        range = 15
        render_power = 3
    }
}

dwindle {
    preserve_split = true
}
### --- Input ---
# !!Languages
input {
    kb_layout = us,ru
    kb_options = grp:alt_space_toggle
}

# !!Window behaviour
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
#bind = CTRL SUPER, right, exec, echo right > /tmp/infinite-nav
#bind = CTRL SUPER, left, exec, echo left > /tmp/infinite-nav
# !!Volume $ Brightness
bindel = , XF86AudioRaiseVolume, exec, swayosd-client --output-volume raise
bindel = , XF86AudioLowerVolume, exec, swayosd-client --output-volume lower
bindl = , XF86AudioMute, exec, swayosd-client --output-volume mute-toggle
bind = , XF86MonBrightnessUp, exec, brightnessctl set +5% && notify-send Яркость $(brightnessctl get | awk '{print int($1*100/255)}')% -h int:value:$(brightnessctl get | awk '{print int($1*100/255)}') -t 1000 -r 999
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%- && notify-send Яркость $(brightnessctl get | awk '{print int($1*100/255)}')% -h int:value:$(brightnessctl get | awk '{print int($1*100/255)}') -t 1000 -r 999
# !!Basic keybinds
bind = $mainMod, W, exec, $wallpaper
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, M, exec,  ~/.config/rofi/powermenu/type-4/powermenu.sh
bind = $mainMod, E, exec, $terminal -e $fileManager
bind = $mainMod, P, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, V, exec, clipman-launcher
bind = $mainMod SHIFT, S, exec, grim -g "$(slurp)" - | wl-copy
