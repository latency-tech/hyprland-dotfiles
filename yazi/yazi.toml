[manager]
show_hidden = true
sort_by = "alphabetical"
sort_sensitive = false
sort_reverse = false

[preview]
tab_size = 2
max_width = 600
max_height = 900
image_filter = "triangle"
image_quality = 75

[opener]
edit = [
    { run = 'code "$@"', block = false, for = "linux" }
]
open = [
    { run = 'imv "$@"', desc = "Открыть в imv", for = "linux" }
]
wine = [
    { run = 'wine "$@"', orphan = true, desc = "Run with Wine", for = "unix" }
]

[open]
prepend_rules = [
    { url = "*.exe", use = "wine" }
]
